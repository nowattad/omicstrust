project:
  name: omicstrust_residualized_embedding_audit
  output_dir: results/residualized_embedding
  random_state: 42

data:
  path: null
  layer: null
  use_raw: false

keys:
  batch_key: tech
  donor_key: null
  label_key: celltype
  technical_covariates:
    - total_counts
    - pct_counts_mt
    - n_genes_by_counts

preprocessing:
  enabled: false
  normalize_total: false
  target_sum: 10000
  log1p: false
  hvg_selection: false
  n_top_genes: 2000
  scale: false
  residualize: false

signal:
  method: ssi
  n_components: 20
  covariance: weighted
  solver: randomized
  regularization: 1.0e-08

nulls:
  enabled: true
  method: within_batch_permutation
  n_permutations: 100
  quantile: 0.95
  n_jobs: 1

risk:
  batch_association_threshold: 0.5
  technical_covariate_threshold: 0.5

stability:
  enabled: true
  n_bootstraps: 20
  subsample_fraction: 0.8

baselines:
  pca: true
  truncated_svd: true
  factor_analysis: false
  scanpy: false
  scvi_audit: false
  harmony_audit: false

reports:
  html: true
  markdown: true
  json: true
  figures: true
  dpi: 150

reproducibility:
  capture_environment: true
  capture_package_versions: true
  save_input_fingerprint: true
