project:
  name: omicstrust_default
  random_state: 42
preprocessing:
  enabled: true
  normalize_total: true
  target_sum: 10000
  log1p: true
  hvg_selection: true
  n_top_genes: 500
  scale: true
  residualize: false
signal:
  method: ssi
  n_components: 10
  covariance: weighted
  solver: auto
  regularization: 1.0e-8
nulls:
  enabled: true
  method: within_batch_permutation
  n_permutations: 20
  quantile: 0.95
  n_jobs: 1
risk:
  batch_association_threshold: 0.5
stability:
  enabled: true
  n_bootstraps: 8
  subsample_fraction: 0.8
reports:
  html: true
  markdown: true
  json: true
  figures: true
  dpi: 150
